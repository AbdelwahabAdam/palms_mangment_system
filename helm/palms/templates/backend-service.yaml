{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "palms.backend.name" . }}
  labels:
    {{- include "palms.componentLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "palms.componentSelectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
{{- end }}
