{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "palms.minio.name" . }}
  labels:
    {{- include "palms.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "palms.componentSelectorLabels" (dict "ctx" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "palms.componentSelectorLabels" (dict "ctx" . "component" "minio") | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :{{ .Values.minio.service.consolePort }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "palms.secretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "palms.secretName" . }}
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: api
              containerPort: {{ .Values.minio.service.apiPort }}
              protocol: TCP
            - name: console
              containerPort: {{ .Values.minio.service.consolePort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          {{- if .Values.minio.persistence.enabled }}
          volumeMounts:
            - name: minio-data
              mountPath: /data
          {{- end }}
      restartPolicy: Always
      {{- if .Values.minio.persistence.enabled }}
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: {{ include "palms.minio.name" . }}-data
      {{- end }}
{{- end }}
