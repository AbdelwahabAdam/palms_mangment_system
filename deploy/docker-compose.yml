name: palms-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: palms_db
      POSTGRES_USER: palms_user
      POSTGRES_PASSWORD: palms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palms_user -d palms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: palms_minio
      MINIO_ROOT_PASSWORD: palms_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in compose.env}
    env_file:
      - ./local.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      mailhog:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE in compose.env}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
