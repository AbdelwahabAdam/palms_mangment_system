---
- name: Add ingress-nginx Helm repository
  kubernetes.core.helm_repository:
    name: ingress-nginx
    repo_url: https://kubernetes.github.io/ingress-nginx

- name: Install ingress-nginx
  kubernetes.core.helm:
    name: ingress-nginx
    chart_ref: ingress-nginx/ingress-nginx
    release_namespace: ingress-nginx
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    timeout: 10m
    values:
      controller:
        service:
          type: NodePort
          nodePorts:
            http: 31080
            https: 31443

# Wait until the Deployment is Available
- name: Wait for ingress controller deployment
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: ingress-nginx
    name: ingress-nginx-controller
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

# Get Pods
- name: Get ingress controller pods
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: ingress-nginx
  register: ingress_pods

- name: Display ingress pods
  ansible.builtin.debug:
    msg: |
      {% for pod in ingress_pods.resources %}
      Name: {{ pod.metadata.name }}
      Status: {{ pod.status.phase }}
      Ready:
      {% for condition in pod.status.conditions | default([]) %}
        {% if condition.type == "Ready" %}
      {{ condition.status }}
        {% endif %}
      {% endfor %}

      {% endfor %}

# Get Services
- name: Get ingress services
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Service
    namespace: ingress-nginx
  register: ingress_services

- name: Display ingress services
  ansible.builtin.debug:
    msg: |
      {% for svc in ingress_services.resources %}
      Name: {{ svc.metadata.name }}
      Type: {{ svc.spec.type }}
      ClusterIP: {{ svc.spec.clusterIP }}
      Ports:
      {% for port in svc.spec.ports %}
        - {{ port.port }} -> {{ port.targetPort }}
      {% endfor %}

      {% endfor %}


# Get Deployment
- name: Get ingress controller deployment
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: ingress-nginx
    name: ingress-nginx-controller
  register: ingress_deployment

- name: Display deployment status
  ansible.builtin.debug:
    msg:
      name: "{{ ingress_deployment.resources[0].metadata.name }}"
      replicas: "{{ ingress_deployment.resources[0].status.replicas | default(0) }}"
      readyReplicas: "{{ ingress_deployment.resources[0].status.readyReplicas | default(0) }}"
      availableReplicas: "{{ ingress_deployment.resources[0].status.availableReplicas | default(0) }}"
      updatedReplicas: "{{ ingress_deployment.resources[0].status.updatedReplicas | default(0) }}"