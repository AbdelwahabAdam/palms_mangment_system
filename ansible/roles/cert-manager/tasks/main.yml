---

# Add Helm Repository
- name: Add Jetstack Helm repository
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Install cert-manager
- name: Install cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    release_namespace: cert-manager
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    timeout: 10m
    values:
      installCRDs: true
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Wait for deployments
- name: Wait for cert-manager deployment
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: cert-manager
    name: cert-manager
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Wait for cert-manager webhook
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: cert-manager
    name: cert-manager-webhook
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Wait for cert-manager cainjector
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: cert-manager
    name: cert-manager-cainjector
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Get Pods
- name: Get cert-manager pods
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: cert-manager
  register: cert_manager_pods
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Display pods
  ansible.builtin.debug:
    msg: |
      {% for pod in cert_manager_pods.resources %}
      ----------------------------------------
      {{ pod.metadata.name }}
      Phase: {{ pod.status.phase }}
      Ready:
      {{
        pod.status.conditions
        | selectattr('type','equalto','Ready')
        | map(attribute='status')
        | first
      }}

      {% endfor %}
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Get Services
- name: Get cert-manager services
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Service
    namespace: cert-manager
  register: cert_manager_services
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Display services
  ansible.builtin.debug:
    msg: |
      {% for svc in cert_manager_services.resources %}
      ----------------------------------------
      {{ svc.metadata.name }}
      Type: {{ svc.spec.type }}
      ClusterIP: {{ svc.spec.clusterIP }}

      {% for port in svc.spec.ports %}
      Port {{ port.port }} -> {{ port.targetPort }}
      {% endfor %}

      {% endfor %}
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Verify CRDs
- name: Get Certificate CRD
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: certificates.cert-manager.io
  register: certificate_crd
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"


# Validate installation
- name: Ensure cert-manager installed successfully
  ansible.builtin.assert:
    that:
      - cert_manager_pods.resources | length >= 3
      - >
        cert_manager_pods.resources
        | map(attribute='status.phase')
        | unique
        | list
        == ['Running']
      - certificate_crd.resources | length == 1
    success_msg: "cert-manager installed successfully."
    fail_msg: "cert-manager installation failed."
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"
