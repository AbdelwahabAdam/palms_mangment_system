---
# tasks file for prometheus

# Helm Repository
- name: Add Prometheus Community Helm repository
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Install Prometheus
- name: Install Prometheus
  kubernetes.core.helm:
    name: prometheus
    chart_ref: prometheus-community/prometheus
    release_namespace: monitoring
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    timeout: 10m
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Wait for Prometheus Server Deployment
- name: Wait for Prometheus server deployment
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: monitoring
    name: prometheus-server
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Get Pods
- name: Get Prometheus pods
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: monitoring
    label_selectors:
      - app.kubernetes.io/instance=prometheus
  register: prometheus_pods
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Display Prometheus pods
  ansible.builtin.debug:
    msg: |
      {% for pod in prometheus_pods.resources %}
      ----------------------------------------
      Name: {{ pod.metadata.name }}
      Phase: {{ pod.status.phase }}
      Ready:
      {{
        pod.status.conditions
        | selectattr('type','equalto','Ready')
        | map(attribute='status')
        | first
      }}

      {% endfor %}
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Get Services
- name: Get Prometheus services
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Service
    namespace: monitoring
    label_selectors:
      - app.kubernetes.io/instance=prometheus
  register: prometheus_services
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Display Prometheus services
  ansible.builtin.debug:
    msg: |
      {% for svc in prometheus_services.resources %}
      ----------------------------------------
      Name: {{ svc.metadata.name }}
      Type: {{ svc.spec.type }}
      ClusterIP: {{ svc.spec.clusterIP }}

      {% for port in svc.spec.ports %}
      Port {{ port.port }} -> {{ port.targetPort }}
      {% endfor %}

      {% endfor %}
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Get Deployment
- name: Get Prometheus server deployment
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: Deployment
    namespace: monitoring
    name: prometheus-server
  register: prometheus_deployment
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

- name: Display deployment status
  ansible.builtin.debug:
    msg:
      replicas: "{{ prometheus_deployment.resources[0].status.replicas | default(0) }}"
      readyReplicas: "{{ prometheus_deployment.resources[0].status.readyReplicas | default(0) }}"
      availableReplicas: "{{ prometheus_deployment.resources[0].status.availableReplicas | default(0) }}"
      updatedReplicas: "{{ prometheus_deployment.resources[0].status.updatedReplicas | default(0) }}"
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"

# Validate Installation
- name: Ensure Prometheus installed successfully
  ansible.builtin.assert:
    that:
      - prometheus_pods.resources | length > 0
      - >
        (
          prometheus_deployment.resources[0].status.availableReplicas
          | default(0)
        ) > 0
    success_msg: "Prometheus installed successfully."
    fail_msg: "Prometheus installation failed."
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"
